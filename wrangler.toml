# Cloudflare Pages 配置
# 部署前请替换 database_id 为实际值

name = "fund-calculator"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# 生产环境变量
[vars]
ENVIRONMENT = "production"

# D1 数据库绑定
# 部署步骤：
# 1. Cloudflare Dashboard → D1 → Create Database
# 2. 复制生成的 database_id 到下方
# 3. Pages → Settings → Bindings → Add D1 → Variable name: DB
[[d1_databases]]
binding = "DB"
database_name = "fund-calculator-db"
database_id = "your-database-id-here"

# 预览环境配置
[env.preview]
[env.preview.vars]
ENVIRONMENT = "preview"

# 生产环境配置
[env.production]
[env.production.vars]
ENVIRONMENT = "production"
