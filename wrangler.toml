# Cloudflare Pages 配置
# 部署前请替换 database_id 为实际值

name = "fund-calculator"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# 生产环境变量
[vars]
ENVIRONMENT = "production"

# D1 数据库绑定
# 请在 Cloudflare Dashboard 中手动绑定 D1 数据库
# Pages → Settings → Bindings → Add D1 → Variable name: DB

# 预览环境配置
[env.preview]
[env.preview.vars]
ENVIRONMENT = "preview"

# 生产环境配置
[env.production]
[env.production.vars]
ENVIRONMENT = "production"
