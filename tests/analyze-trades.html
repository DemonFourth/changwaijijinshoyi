<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>交易数据分析</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .error { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 4px; margin: 10px 0; }
        .warning { color: #f57c00; background: #fff3e0; padding: 10px; border-radius: 4px; margin: 10px 0; }
        .success { color: #388e3c; background: #e8f5e9; padding: 10px; border-radius: 4px; margin: 10px 0; }
        .info { color: #1976d2; background: #e3f2fd; padding: 10px; border-radius: 4px; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        .buy { color: #388e3c; }
        .sell { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>交易数据分析</h1>
        <div id="content"></div>
    </div>
    
    <script src="../js/namespace.js"></script>
    <script src="../js/moduleRegistry.js"></script>
    <script src="../js/eventBus.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/dataService.js"></script>
    <script src="../js/calculator.js"></script>
    <script src="../js/fundManager.js"></script>
    <script src="../js/tradeManager.js"></script>
    
    <script>
        const content = document.getElementById('content');
        let html = '';
        
        function addSection(title, body, className = '') {
            html += `<div class="section ${className}"><h2>${title}</h2>${body}</div>`;
        }
        
        // 获取数据
        const funds = DataService.loadFunds();
        const allTrades = DataService.loadTrades();
        
        // 按基金分组
        const tradesByFund = {};
        allTrades.forEach(t => {
            if (!tradesByFund[t.fundId]) {
                tradesByFund[t.fundId] = [];
            }
            tradesByFund[t.fundId].push(t);
        });
        
        // 分析每个基金
        funds.forEach(fund => {
            const trades = tradesByFund[fund.id] || [];
            if (trades.length === 0) return;
            
            // 按日期排序
            trades.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            let sectionHtml = `<div class="info">基金ID: ${fund.id}<br>代码: ${fund.code}<br>名称: ${fund.name}<br>当前净值: ${fund.netValue}</div>`;
            
            // 统计
            let buyCount = 0, sellCount = 0;
            let buyShares = 0, sellShares = 0;
            let buyAmount = 0, sellAmount = 0;
            
            trades.forEach(t => {
                if (t.type === 'buy') {
                    buyCount++;
                    buyShares += t.shares;
                    buyAmount += t.amount;
                } else if (t.type === 'sell') {
                    sellCount++;
                    sellShares += t.shares;
                    sellAmount += t.amount;
                }
            });
            
            sectionHtml += `<div class="info">
                <strong>交易统计:</strong><br>
                买入: ${buyCount}笔, ${buyShares}份, ${buyAmount.toFixed(2)}元<br>
                卖出: ${sellCount}笔, ${sellShares}份, ${sellAmount.toFixed(2)}元<br>
                净买入: ${buyShares - sellShares}份
            </div>`;
            
            // 检查问题
            if (sellShares > buyShares) {
                sectionHtml += `<div class="error">
                    <strong>❌ 错误: 危出份额(${sellShares})超过买入份额(${buyShares})</strong><br>
                    这会导致计算错误！请检查交易记录是否正确。
                </div>`;
            }
            
            // 交易明细表
            sectionHtml += '<table><thead><tr><th>序号</th><th>日期</th><th>类型</th><th>净值</th><th>份额</th><th>金额</th><th>手续费</th><th>累计份额</th></tr></thead><tbody>';
            
            let cumulativeShares = 0;
            trades.forEach((t, i) => {
                if (t.type === 'buy') {
                    cumulativeShares += t.shares;
                } else if (t.type === 'sell') {
                    cumulativeShares -= t.shares;
                }
                
                const typeClass = t.type === 'buy' ? 'buy' : 'sell';
                const typeText = t.type === 'buy' ? '买入' : '危出';
                
                sectionHtml += `<tr>
                    <td>${i + 1}</td>
                    <td>${t.date}</td>
                    <td class="${typeClass}">${typeText}</td>
                    <td>${(t.netValue || 0).toFixed(4)}</td>
                    <td>${t.shares}</td>
                    <td>${t.amount.toFixed(2)}</td>
                    <td>${t.fee.toFixed(2)}</td>
                    <td class="${cumulativeShares < 0 ? 'sell' : ''}">${cumulativeShares.toFixed(2)}</td>
                </tr>`;
                
                if (cumulativeShares < 0) {
                    sectionHtml += `<tr><td colspan="8" class="error">❌ 第${i+1}笔交易后，持仓为负数！</td></tr>`;
                }
            });
            sectionHtml += '</tbody></table>';
            
            // 计算收益
            const stats = Calculator.calculateFundProfit(trades, fund.netValue);
            
            sectionHtml += `<div class="section">
                <h3>收益计算结果</h3>
                <table>
                    <tr><th>项目</th><th>数值</th></tr>
                    <tr><td>持仓份额</td><td>${stats.holding.shares.toFixed(2)}</td></tr>
                    <tr><td>持仓成本</td><td>${stats.holding.cost.toFixed(2)} 元</td></tr>
                    <tr><td>每份成本</td><td>${stats.holding.costPerShare.toFixed(4)} 元</td></tr>
                    <tr><td>当前市值</td><td>${stats.holding.value.toFixed(2)} 元</td></tr>
                    <tr><td>持仓收益</td><td class="${stats.holding.profit >= 0 ? 'buy' : 'sell'}">${stats.holding.profit.toFixed(2)} 元</td></tr>
                    <tr><td>持仓收益率</td><td class="${stats.holding.profitRate >= 0 ? 'buy' : 'sell'}">${stats.holding.profitRate.toFixed(2)}%</td></tr>
                    <tr><td>已实现收益</td><td class="${stats.realized.profit >= 0 ? 'buy' : 'sell'}">${stats.realized.profit.toFixed(2)} 元</td></tr>
                    <tr><td>总收益</td><td class="${stats.total.amount >= 0 ? 'buy' : 'sell'}">${stats.total.amount.toFixed(2)} 元</td></tr>
                    <tr><td>总收益率</td><td class="${stats.total.rate >= 0 ? 'buy' : 'sell'}">${stats.total.rate.toFixed(2)}%</td></tr>
                </table>
            </div>`;
            
            // 已实现收益明细
            if (stats.realized.details.length > 0) {
                sectionHtml += `<div class="section">
                    <h3>已实现收益明细</h3>
                    <table>
                        <thead><tr><th>序号</th><th>日期</th><th>类型</th><th>份额</th><th>危出金额</th><th>成本</th><th>手续费</th><th>收益</th></tr></thead>
                        <tbody>`;
                stats.realized.details.forEach((d, i) => {
                    if (d.type === 'dividend') {
                        sectionHtml += `<tr>
                            <td>${i + 1}</td>
                            <td>${d.date}</td>
                            <td>分红</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td class="buy">${d.amount.toFixed(2)}</td>
                        </tr>`;
                    } else {
                        sectionHtml += `<tr>
                            <td>${i + 1}</td>
                            <td>${d.date}</td>
                            <td>危出</td>
                            <td>${d.shares}</td>
                            <td>${d.sellAmount.toFixed(2)}</td>
                            <td>${d.costAmount.toFixed(2)}</td>
                            <td>${d.fee.toFixed(2)}</td>
                            <td class="${d.profit >= 0 ? 'buy' : 'sell'}">${d.profit.toFixed(2)}</td>
                        </tr>`;
                    }
                });
                sectionHtml += '</tbody></table></div>';
            }
            
            addSection(`基金: ${fund.name} (${fund.code})`, sectionHtml);
        });
        
        content.innerHTML = html;
    </script>
</body>
</html>
