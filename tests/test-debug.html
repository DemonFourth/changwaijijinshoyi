<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>深度调试</title>
</head>
<body>
    <h1>TradeManager深度调试</h1>
    <pre id="output"></pre>
    
    <script src="js/namespace.js"></script>
    <script src="js/moduleRegistry.js"></script>
    <script src="js/eventBus.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/dataService.js"></script>
    <script src="js/tradeManager.js"></script>
    
    <script>
        const output = document.getElementById('output');
        const logs = [];
        
        function log(msg) {
            logs.push(msg);
            console.log(msg);
        }
        
        log('=== TradeManager对象分析 ===');
        log('1. TradeManager类型: ' + typeof TradeManager);
        log('2. TradeManager是对象: ' + (TradeManager !== null && typeof TradeManager === 'object'));
        log('');
        
        log('=== 检查所有方法 ===');
        const methods = [
            'init', 'getTradesByFund', 'getTrade', 'addTrade', 
            'updateTrade', 'deleteTrade', 'validateTradeData', 
            'checkTradeReasonality', 'batchAddTrades', 'getTradeStats',
            'getTradesByDateRange', 'getRecentTrades'
        ];
        
        methods.forEach(method => {
            const exists = method in TradeManager;
            const type = typeof TradeManager[method];
            log(`${method}: ${exists ? '✅' : '❌'} (${type})`);
        });
        
        log('');
        log('=== TradeManager对象的键 ===');
        log(Object.keys(TradeManager).join(', '));
        
        log('');
        log('=== 尝试调用checkTradeReasonality ===');
        try {
            const result = TradeManager.checkTradeReasonality({
                type: 'buy',
                fundId: 'test',
                shares: 100
            });
            log('调用成功: ' + JSON.stringify(result));
        } catch (error) {
            log('调用失败: ' + error.message);
            log('错误堆栈: ' + error.stack);
        }
        
        log('');
        log('=== 尝试调用addTrade ===');
        try {
            const result = TradeManager.addTrade({
                fundId: 'test',
                date: '2024-01-01',
                type: 'buy',
                shares: 100,
                amount: 1000,
                fee: 0
            });
            log('调用成功: ' + JSON.stringify(result));
        } catch (error) {
            log('调用失败: ' + error.message);
            log('错误堆栈: ' + error.stack);
        }
        
        output.textContent = logs.join('\n');
    </script>
</body>
</html>
