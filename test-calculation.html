<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>收益率计算测试</title>
</head>
<body>
    <h1>收益率计算测试</h1>
    <pre id="output"></pre>
    
    <script src="js/namespace.js"></script>
    <script src="js/moduleRegistry.js"></script>
    <script src="js/eventBus.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/dataService.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/fundManager.js"></script>
    <script src="js/tradeManager.js"></script>
    
    <script>
        const output = document.getElementById('output');
        const logs = [];
        
        function log(msg) {
            logs.push(msg);
            console.log(msg);
        }
        
        // 获取所有基金
        const funds = DataService.loadFunds();
        log('=== 基金列表 ===');
        log('基金数量: ' + funds.length);
        
        funds.forEach(fund => {
            log('\n--- 基金: ' + fund.name + ' (' + fund.code + ') ---');
            log('基金ID: ' + fund.id);
            log('当前净值: ' + fund.netValue);
            
            // 获取交易记录
            const trades = DataService.getTradesByFund(fund.id);
            log('交易记录数: ' + trades.length);
            
            if (trades.length > 0) {
                log('\n交易记录详情:');
                trades.forEach((trade, index) => {
                    log(`${index + 1}. ${trade.date} - ${trade.type} - 份额: ${trade.shares}, 金额: ${trade.amount}, 手续费: ${trade.fee}`);
                });
                
                // 计算收益
                log('\n计算收益:');
                const stats = Calculator.calculateFundProfit(trades, fund.netValue);
                
                log('持仓信息:');
                log('  份额: ' + stats.holding.shares);
                log('  成本: ' + stats.holding.cost);
                log('  每份成本: ' + stats.holding.costPerShare);
                log('  市值: ' + stats.holding.value);
                log('  持仓收益: ' + stats.holding.profit);
                log('  持仓收益率: ' + stats.holding.profitRate + '%');
                
                log('\n已实现收益:');
                log('  总额: ' + stats.realized.profit);
                if (stats.realized.details.length > 0) {
                    stats.realized.details.forEach(detail => {
                        log('  - ' + JSON.stringify(detail));
                    });
                }
                
                log('\n总收益:');
                log('  金额: ' + stats.total.amount);
                log('  收益率: ' + stats.total.rate + '%');
            }
        });
        
        output.textContent = logs.join('\n');
    </script>
</body>
</html>
